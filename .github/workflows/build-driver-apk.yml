name: Build Driver App APK

on:
  workflow_dispatch: # This allows you to manually trigger the build from GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        working-directory: ./mobile-app/driver-app
        run: npm install

      - name: Prebuild Expo Project
        working-directory: ./mobile-app/driver-app
        run: npx expo prebuild -p android

      - name: Build APK with Gradle
        working-directory: ./mobile-app/driver-app/android
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: driver-app-apk
          path: mobile-app/driver-app/android/app/build/outputs/apk/release/app-release.apk
